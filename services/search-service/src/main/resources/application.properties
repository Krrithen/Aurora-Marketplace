# Solr Configuration
solr.host=http://localhost:8983/solr/
solr.core=searchProducts
solr.url=${solr.host}${solr.core}
solr.connection.timeout=10000
solr.socket.timeout=60000
solr.max.connections=100
solr.max.connections.per.host=20

# Server Configuration
server.port=8082
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# Management and Health Checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.solr.enabled=true

# Logging Configuration
logging.level.com.example.Search=INFO
logging.level.org.apache.solr=WARN
logging.level.org.springframework.web=INFO

# Application Configuration
spring.application.name=aurora-marketplace-search-service
spring.profiles.active=default
