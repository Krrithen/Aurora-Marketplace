syntax = "proto3";

// Defines the Java package where the generated files will live
option java_package = "com.example.orders.grpc";
option java_multiple_files = true;

package orders;

// The equivalent of your Controller
service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder (GetOrderRequest) returns (OrderResponse);
}

// The equivalent of your DTOs
message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItemProto items = 2; // "repeated" means List<>
}

message OrderItemProto {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  string price = 4; // Sent as a string to preserve BigDecimal precision
  string merchant_id = 5;
}

message GetOrderRequest {
  string order_id = 1;
}

message OrderResponse {
  string order_id = 1;
  string user_id = 2;
  string status = 3;
  string total_price = 4;
  repeated OrderItemProto items = 5;
}