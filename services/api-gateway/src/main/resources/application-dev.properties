# Development Environment Configuration
spring.profiles.active=dev

# Server Configuration
server.port=8081
server.servlet.context-path=/

# MongoDB Configuration (Development)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=products_dev
spring.data.mongodb.repositories.enabled=true

# Service URLs Configuration (Development)
services.merchant.url=http://localhost:8086/merchants
services.search.url=http://localhost:8082
services.user.url=http://localhost:8083/users
services.cart.url=http://localhost:8084/cart
services.order.url=http://localhost:8085/orders

# Logging Configuration (Development)
logging.level.com.example.ecomProject=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Circuit Breaker Configuration (Development)
resilience4j.circuitbreaker.instances.merchant-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.merchant-service.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.merchant-service.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.merchant-service.wait-duration-in-open-state=10s

# Actuator Configuration (Development)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.mongo.enabled=true
management.metrics.export.prometheus.enabled=true

# SpringDoc Configuration (Development)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
