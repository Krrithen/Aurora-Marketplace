# Default Configuration (can be overridden by profiles)
spring.profiles.active=dev
spring.application.name=aurora-marketplace-api-gateway

# Server Configuration
server.port=8081
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=products
spring.data.mongodb.repositories.enabled=true

# Service URLs Configuration
services.merchant.url=http://localhost:8086/merchants
services.search.url=http://localhost:8085
services.user.url=http://localhost:8084/users
services.cart.url=http://localhost:8087/cart
services.order.url=http://localhost:8083/orders

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.mongo.enabled=true

# Logging Configuration
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.com.example.ecomProject=INFO

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.merchant-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.merchant-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.merchant-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.merchant-service.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.search-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.search-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.search-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.search-service.wait-duration-in-open-state=30s

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}