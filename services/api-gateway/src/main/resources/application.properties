# Default Configuration (can be overridden by profiles)
spring.profiles.active=dev
spring.application.name=aurora-marketplace-api-gateway

# Server Configuration
server.port=8081
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

grpc.client.order-service.address=discovery:///aurora-marketplace-order-service
grpc.client.order-service.negotiation-type=plaintext
grpc.client.catalog-service.address=discovery:///aurora-marketplace-catalog-service
grpc.client.catalog-service.negotiation-type=plaintext
grpc.client.search-service.address=discovery:///aurora-marketplace-search-service
grpc.client.search-service.negotiation-type=plaintext

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.mongo.enabled=true

logging.level.com.example.ecomProject=INFO

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}