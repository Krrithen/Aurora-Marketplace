# Production Environment Configuration
spring.profiles.active=prod

# Server Configuration
server.port=8081
server.servlet.context-path=/

# MongoDB Configuration (Production)
spring.data.mongodb.host=${MONGODB_HOST:localhost}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:products}
spring.data.mongodb.username=${MONGODB_USERNAME:}
spring.data.mongodb.password=${MONGODB_PASSWORD:}
spring.data.mongodb.authentication-database=${MONGODB_AUTH_DB:admin}

# Service URLs Configuration (Production)
services.merchant.url=${MERCHANT_SERVICE_URL:http://merchant-service:8086/merchants}
services.search.url=${SEARCH_SERVICE_URL:http://search-service:8082}
services.user.url=${USER_SERVICE_URL:http://user-service:8083/users}
services.cart.url=${CART_SERVICE_URL:http://cart-service:8084/cart}
services.order.url=${ORDER_SERVICE_URL:http://order-service:8085/orders}

# Logging Configuration (Production)
logging.level.com.example.ecomProject=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN
logging.level.org.springframework.cloud.openfeign=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Circuit Breaker Configuration (Production)
resilience4j.circuitbreaker.instances.merchant-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.merchant-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.merchant-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.merchant-service.wait-duration-in-open-state=60s

# Actuator Configuration (Production)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.mongo.enabled=true
management.metrics.export.prometheus.enabled=true

# SpringDoc Configuration (Production)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
